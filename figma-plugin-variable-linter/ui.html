<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Inter, system-ui, sans-serif;
  font-size: 12px;
  background: #FAF5F2;
  color: #000;
  padding: 20px;
  width: 240px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.logo { width: 48px; height: auto; display: block; margin-bottom: 20px; }
.label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 12px;
}
button {
  width: 100%;
  padding: 10px 16px;
  border: none;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  background: #000;
  color: #FAF5F2;
}
button:hover    { opacity: 0.75; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
#status {
  font-size: 11px;
  color: #555;
  min-height: 16px;
  margin-top: 12px;
}
#status.error { color: #c0392b; }
#status.success {
  background: #e6f4ec;
  color: #1a7a3c;
  font-weight: 600;
  padding: 8px 10px;
  border-radius: 4px;
}
</style>

<p class="label">Variable Linter</p>
<button id="btn-run">Run Audit</button>
<div id="status"></div>

<script>
var status = document.getElementById('status');
var btnRun = document.getElementById('btn-run');

btnRun.addEventListener('click', function() {
  btnRun.disabled = true;
  status.className = '';
  status.textContent = 'Running…';
  parent.postMessage({ pluginMessage: { type: 'run' } }, '*');
});

window.onmessage = function(event) {
  var msg = event.data.pluginMessage;
  if (!msg) return;
  btnRun.disabled = false;
  if (msg.type === 'result') {
    if (msg.count === 0) {
      status.className = 'success';
      status.textContent = '✓ No violations found';
    } else {
      status.className = 'error';
      status.textContent = '→ ' + msg.count + ' violation' + (msg.count > 1 ? 's' : '') + ' found';
    }
  }
  if (msg.type === 'error') {
    status.className = 'error';
    status.textContent = msg.message;
  }
};
</script>
